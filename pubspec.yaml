name: outfithub
description: "A new Flutter project for Men's Fashion Store."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Firebase-ийн үндсэн сангууд
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0 # Дараа нь өгөгдөл хадгалахад хэрэг болно
  
  # HTTP хүсэлт (Хэрэв хэрэг болвол байлгаж болно)
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Зургуудаа энд ингэж бүртгэнэ (Зай авахад маш анхаараарай)
  assets:
    - assets/images/background.png